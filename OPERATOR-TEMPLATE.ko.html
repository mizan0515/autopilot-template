<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>오토파일럿 관리자 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "맑은 고딕", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 24px;
    min-height: 100vh;
    line-height: 1.5;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 4px; color: #f1f5f9; }
  .sub { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }

  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    border: 1px solid #334155;
  }
  .hero {
    background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
    border: 2px solid #475569;
  }
  .hero.warn   { border-color: #f59e0b; background: linear-gradient(135deg, #451a03 0%, #78350f 100%); }
  .hero.stuck  { border-color: #ef4444; background: linear-gradient(135deg, #450a0a 0%, #7f1d1d 100%); }
  .hero.halted { border-color: #a78bfa; background: linear-gradient(135deg, #2e1065 0%, #4c1d95 100%); }
  .hero.ok     { border-color: #22c55e; background: linear-gradient(135deg, #052e16 0%, #14532d 100%); }

  .label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .big { font-size: 28px; font-weight: 700; color: #f1f5f9; margin-bottom: 12px; }
  .action { font-size: 16px; color: #e2e8f0; }
  .action code {
    background: #0f172a;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 15px;
    color: #fbbf24;
    font-family: "Consolas", "Courier New", monospace;
    display: inline-block;
    margin: 4px 2px;
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

  .stat { font-size: 20px; font-weight: 600; color: #f1f5f9; }
  .stat.small { font-size: 14px; font-weight: 400; color: #cbd5e1; }

  .progress {
    background: #0f172a;
    border-radius: 8px;
    height: 10px;
    overflow: hidden;
    margin-top: 12px;
  }
  .progress > div {
    height: 100%;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    transition: width 0.3s;
  }

  .history {
    list-style: none;
    font-size: 13px;
    color: #cbd5e1;
    font-family: "Consolas", "Courier New", monospace;
    white-space: pre-wrap;
    max-height: 240px;
    overflow-y: auto;
  }
  .history li { padding: 4px 0; border-bottom: 1px solid #334155; }
  .history li:last-child { border-bottom: none; }

  .footer { color: #64748b; font-size: 11px; text-align: center; margin-top: 24px; }
  .foot-tip { color: #94a3b8; font-size: 13px; margin-top: 12px; }
  kbd {
    background: #334155; color: #f1f5f9; padding: 2px 6px; border-radius: 4px;
    font-family: monospace; font-size: 12px; border: 1px solid #475569;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🤖 오토파일럿 관리자 대시보드</h1>
  <div class="sub" id="updated">업데이트: —</div>

  <!-- Hero: 지금 해주실 일 -->
  <div class="card hero" id="hero">
    <div class="label">👉 관리자님이 지금 해주실 일</div>
    <div class="big" id="action-title">확인 중…</div>
    <div class="action" id="action-body"></div>
  </div>

  <!-- 상태/진행도 -->
  <div class="grid">
    <div class="card">
      <div class="label">현재 상태</div>
      <div class="stat" id="status">—</div>
      <div class="stat small" id="mode">—</div>
    </div>
    <div class="card">
      <div class="label">진행 회차 (iteration)</div>
      <div class="stat" id="iter">—</div>
      <div class="progress"><div id="iter-bar" style="width:0%"></div></div>
      <div class="stat small" id="iter-hint" style="margin-top:8px;">—</div>
    </div>
  </div>

  <!-- 재예약 상태 -->
  <div class="card">
    <div class="label">다음 자동 깨어남</div>
    <div class="stat" id="wake">—</div>
    <div class="stat small" id="wake-hint">—</div>
  </div>

  <!-- 최근 작업 -->
  <div class="card">
    <div class="label">📜 최근 작업 (HISTORY.md)</div>
    <ul class="history" id="history"><li>—</li></ul>
  </div>

  <div class="foot-tip">
    이 화면은 자동 갱신되지 않습니다. 새로 보려면
    <kbd>관리자 대시보드 열기.cmd</kbd> 를 다시 더블클릭하세요.
    정지/재개는 PowerShell에서 <kbd>.\.autopilot\관리자.ps1</kbd> 실행.
  </div>

  <div class="footer">
    모든 커밋·PR·머지·브랜치 정리는 자동입니다. 사람이 손댈 일은 이 화면 상단의 "지금 해주실 일"에만 나옵니다.
  </div>
</div>

<!-- PowerShell이 주입하는 데이터 (단순 문자열 치환). JS가 JSON.parse로 읽어 DOM 갱신. -->
<script id="data" type="application/json">{{JSON_DATA}}</script>
<script>
(function(){
  var raw = document.getElementById('data').textContent;
  var d;
  try { d = JSON.parse(raw); }
  catch (e) {
    document.body.innerHTML = '<div class="wrap"><h1>⚠️ 데이터 읽기 실패</h1><pre style="color:#fca5a5;">'+String(e)+'\n\n원본:\n'+raw+'</pre></div>';
    return;
  }

  function set(id, text) { var el=document.getElementById(id); if(el) el.textContent = text; }

  set('updated',      '업데이트: ' + (d.updated_at_local || d.updated_at || '—'));
  set('status',       d.status || '—');
  set('mode',         d.mode ? ('모드: ' + d.mode) : '');
  set('iter',         'iter ' + (d.iteration == null ? '?' : d.iteration));
  set('iter-hint',    d.iteration_hint || '');
  set('wake',         d.wake_summary || '—');
  set('wake-hint',    d.wake_hint || '');

  var hero = document.getElementById('hero');
  hero.classList.add(d.hero_class || 'ok');
  set('action-title', d.action_title || '✅ 없습니다. 지금은 기다리면 됩니다.');
  var body = document.getElementById('action-body');
  body.innerHTML = d.action_body_html || '아무것도 안 하셔도 됩니다.';

  var bar = document.getElementById('iter-bar');
  if (bar && typeof d.progress_pct === 'number') bar.style.width = Math.min(100, Math.max(0, d.progress_pct)) + '%';

  var ul = document.getElementById('history');
  ul.innerHTML = '';
  (d.history_lines && d.history_lines.length ? d.history_lines : ['(HISTORY.md 비어있음)']).forEach(function(line){
    var li = document.createElement('li');
    li.textContent = line;
    ul.appendChild(li);
  });
})();
</script>
</body>
</html>
